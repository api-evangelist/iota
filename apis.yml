description: IOTA is an open-source distributed ledger technology built to bring real-world
  applications on-chain. It is the first internet-scale programmable blockchain platform
  powered by the Move programming language with horizontal scaling, feeless transactions,
  and a unique parallel transaction processing model. IOTA exposes a JSON-RPC 2.0
  API over HTTP and a GraphQL RPC for querying objects, checkpoints, transactions,
  coins, events, and on-chain state on Mainnet, Testnet, and Devnet networks. The
  platform targets trade and supply chains, decentralized finance, digital identity,
  real-world asset tokenization, and product lifecycle management.
