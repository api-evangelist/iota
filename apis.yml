- type: UseCases
  data:
  - name: DeFi Application Backend
    description: Query coin balances, object states, and submit transactions for decentralized
      finance apps on IOTA
  - name: Supply Chain Traceability
    description: Track real-world assets and product lifecycle data on the IOTA distributed
      ledger
  - name: Digital Identity
    description: Manage decentralized identifiers (DIDs) and verifiable credentials
      on-chain
  - name: Real-World Asset Tokenization
    description: Tokenize and manage traditional financial assets bridged to IOTA
      using Move smart contracts
  - name: Blockchain Analytics
    description: Query checkpoints, transaction blocks, and events for real-time analytics
      and data pipelines
  - name: Wallet Development
    description: Check coin balances, fetch transaction history, build and submit
      signed transactions
  - name: Smart Contract Development
    description: Introspect Move modules, deploy packages, and interact with on-chain
      programs via Move Utils
  - name: EVM dApp Migration
    description: Deploy existing Solidity smart contracts on IOTA EVM Layer 2 using
      standard Ethereum tooling
- type: Features
  data:
  - name: JSON-RPC 2.0 over HTTP
    description: Standard JSON-RPC 2.0 protocol over HTTP POST to IOTA full nodes
      and indexers
  - name: GraphQL RPC
    description: GraphQL interface as an alternative to JSON-RPC for flexible on-chain
      data queries
  - name: Three Network Environments
    description: Mainnet (production), Testnet (testing), and Devnet (development)
      environments with faucets
  - name: Move Smart Contracts
    description: Asset-oriented Move programming language for type-safe, resource-oriented
      smart contracts
  - name: EVM Layer 2
    description: Ethereum-compatible EVM Layer 2 chain enabling Solidity contract
      deployment and tooling reuse
  - name: No Authentication Required
    description: Public endpoints are open and require no API key for development
      and testing use
  - name: Cursor-based Pagination
    description: All list endpoints support cursor-based pagination for efficient
      data traversal
  - name: BCS Binary Encoding
    description: Binary Canonical Serialization (BCS) support alongside JSON for efficient
      data transfer
